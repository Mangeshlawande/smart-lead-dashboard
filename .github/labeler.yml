# .github/labeler.yml
# Maps PR labels to file path globs

backend:
  - changed-files:
    - any-glob-to-any-file: 'backend/**'

frontend:
  - changed-files:
    - any-glob-to-any-file: 'frontend/**'

docker:
  - changed-files:
    - any-glob-to-any-file:
        - 'docker-compose*.yml'
        - '**/Dockerfile'

ci/cd:
  - changed-files:
    - any-glob-to-any-file: '.github/**'

documentation:
  - changed-files:
    - any-glob-to-any-file:
        - '**/*.md'
        - 'API.md'
        - 'README.md'

dependencies:
  - changed-files:
    - any-glob-to-any-file:
        - '**/package.json'
        - '**/package-lock.json'

tests:
  - changed-files:
    - any-glob-to-any-file: '**/__tests__/**'

auth:
  - changed-files:
    - any-glob-to-any-file:
        - 'backend/src/services/auth.service.ts'
        - 'backend/src/controllers/auth.controller.ts'
        - 'backend/src/routes/auth.routes.ts'
        - 'backend/src/middleware/auth.ts'
        - 'frontend/src/store/auth.store.ts'
        - 'frontend/src/hooks/useAuth.ts'
        - 'frontend/src/pages/LoginPage.tsx'
        - 'frontend/src/pages/RegisterPage.tsx'

leads:
  - changed-files:
    - any-glob-to-any-file:
        - 'backend/src/services/lead.service.ts'
        - 'backend/src/controllers/lead.controller.ts'
        - 'backend/src/routes/lead.routes.ts'
        - 'backend/src/models/Lead.ts'
        - 'frontend/src/components/leads/**'
        - 'frontend/src/pages/LeadsPage.tsx'
