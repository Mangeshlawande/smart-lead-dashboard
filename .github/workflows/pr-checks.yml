name: PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  # ──────────────────────────────────────────────
  # Enforce conventional commit format on PR title
  # (title becomes the squash-merge commit message)
  # ──────────────────────────────────────────────
  conventional-title:
    name: Conventional Commit Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
            ci
            revert
          scopes: |
            backend
            frontend
            auth
            leads
            docker
            deps
          requireScope: false
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            The subject "{subject}" must start with an uppercase letter.

  # ──────────────────────────────────────────────
  # Auto-label PRs based on changed files
  # ──────────────────────────────────────────────
  label:
    name: Auto Label
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Label PR by changed paths
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  # ──────────────────────────────────────────────
  # Fail if PR has no description
  # ──────────────────────────────────────────────
  description-check:
    name: PR Has Description
    runs-on: ubuntu-latest
    steps:
      - name: Check PR body is not empty
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body;
            if (!body || body.trim().length < 20) {
              core.setFailed('PR description is missing or too short. Please describe what this PR does.');
            }
