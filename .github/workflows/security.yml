name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - '**/package-lock.json'
      - '**/package.json'
  schedule:
    # Every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  audit:
    name: npm audit (${{ matrix.workspace }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        workspace: [backend, frontend]

    defaults:
      run:
        working-directory: ${{ matrix.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run security audit (high + critical only)
        run: npm audit --audit-level=high

      - name: Check for known vulnerabilities with better-npm-audit
        run: npx better-npm-audit audit --level high
        continue-on-error: true  # report but don't hard-fail on first run
